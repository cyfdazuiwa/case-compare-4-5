<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case 录屏对比模版</title>
<link rel="stylesheet" href="fonts/MiSans-Demibold.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #ffffff;
    overflow: hidden;
  }

  /* 1920×1080 固定画布，按窗口等比缩放，保证录屏比例恒定 */
  #viewport {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff;
  }
  #stage {
    width: 1920px; height: 1080px;
    flex: 0 0 auto;
    transform-origin: center center;
    position: relative;
    background: #ffffff;
  }

  .row {
    position: absolute; top: 108px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 200px;
  }
  .col { width: 660px; display: flex; flex-direction: column; align-items: center; }

  /* 上方标题 —— 可直接点击编辑 */
  .title {
    font-family: "MiSans", "PingFang SC", "Hiragino Sans GB", sans-serif;
    font-weight: 450;
    font-size: 46px;
    line-height: 1.25;
    color: #1f1f1f;
    text-align: center;
    margin-bottom: 26px;
    min-width: 120px;
    padding: 4px 14px;
    border-radius: 10px;
    outline: none;
    cursor: text;
    transition: background .15s ease;
    white-space: nowrap;
  }
  .title:hover { background: #f3f3f3; }
  .title:focus { background: #ececec; }
  .title:empty::before {
    content: "点击编辑标题";
    color: #c4c4c4;
  }

  /* 设备框：浅灰描边 + 右下错位叠层 */
  .device {
    position: relative;
    width: 660px; height: 800px;
  }
  .device::before {
    content: "";
    position: absolute; inset: 0;
    transform: translate(14px, 14px);
    border-radius: 26px;
    background: #ececec;
    border: 2px solid #dcdcdc;
    z-index: 0;
  }
  .screen {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    border-radius: 26px;
    border: 3px solid #d4d4d4;
    background: #fafafa;
    overflow: hidden;
    cursor: pointer;
  }
  .screen video, .screen img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 空状态占位 */
  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    color: #b8b8b8;
    font-family: "MiSans", "PingFang SC", sans-serif;
    font-weight: 450;
    font-size: 22px;
    letter-spacing: 1px;
    user-select: none;
    transition: color .15s ease;
  }
  .placeholder svg { width: 56px; height: 56px; stroke: #c8c8c8; transition: stroke .15s ease; }
  .placeholder small { font-size: 16px; color: #d0d0d0; letter-spacing: .5px; }
  .screen:hover .placeholder { color: #909090; }
  .screen:hover .placeholder svg { stroke: #a0a0a0; }
  .screen.dragover { border-color: #9a9a9a; background: #f2f2f2; }
  .screen.has-media .placeholder { display: none; }
  .screen.has-media:hover::after {
    content: "点击替换素材";
    position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    font-family: "MiSans", "PingFang SC", sans-serif; font-weight: 450;
    font-size: 16px; letter-spacing: 1px;
    color: #fff; background: rgba(0,0,0,.55);
    padding: 8px 20px; border-radius: 999px;
    pointer-events: none;
  }

  /* 同步控制条：导入视频后出现，鼠标静止 2.5s 自动隐藏 */
  .toolbar {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    padding: 8px;
    background: rgba(30,30,30,.78);
    border-radius: 999px;
    z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .toolbar.show { opacity: 1; pointer-events: auto; }
  .toolbar button {
    display: flex; align-items: center; gap: 7px;
    border: none; cursor: pointer;
    background: rgba(255,255,255,.12);
    color: #fff;
    font-family: "MiSans", "PingFang SC", sans-serif; font-weight: 450;
    font-size: 16px; letter-spacing: .5px;
    padding: 9px 18px; border-radius: 999px;
    transition: background .15s ease;
  }
  .toolbar button:hover { background: rgba(255,255,255,.24); }
  .toolbar button svg {
    width: 16px; height: 16px;
    stroke: #fff; fill: none; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }
  #btnPause .i-play { display: none; }
  #btnPause.paused .i-pause { display: none; }
  #btnPause.paused .i-play { display: block; }

  input[type="file"] { display: none; }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">
    <div class="row">

      <div class="col">
        <div class="title" contenteditable="true" spellcheck="false">Claude Opus 4.8</div>
        <div class="device">
          <div class="screen" data-slot>
            <div class="placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="3"/>
                <path d="M10 9.2v5.6L15 12z" fill="none"/>
              </svg>
              <span>点击上传录屏</span>
              <small>或拖拽视频 / 图片到此处</small>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="title" contenteditable="true" spellcheck="false">KIMI K3</div>
        <div class="device">
          <div class="screen" data-slot>
            <div class="placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="3"/>
                <path d="M10 9.2v5.6L15 12z" fill="none"/>
              </svg>
              <span>点击上传录屏</span>
              <small>或拖拽视频 / 图片到此处</small>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="toolbar" id="toolbar">
      <button id="btnReplay" title="从头播放 (R)">
        <svg viewBox="0 0 24 24"><path d="M4 4v5h5"/><path d="M4.5 9a8 8 0 1 1-1 4"/></svg>
        <span>从头播放</span>
      </button>
      <button id="btnPause" title="暂停 / 播放 (空格)">
        <svg class="i-pause" viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg>
        <svg class="i-play" viewBox="0 0 24 24"><path d="M8 5.5v13l11-6.5z"/></svg>
        <span>暂停</span>
      </button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="video/*,image/*">

<script>
  /* 等比缩放 1920×1080 画布 */
  function fitStage() {
    var s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    document.getElementById('stage').style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  /* 标题：单行编辑，回车结束，粘贴纯文本 */
  document.querySelectorAll('.title').forEach(function (t) {
    t.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); t.blur(); }
    });
    t.addEventListener('paste', function (e) {
      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });

  /* 同步播放控制：所有视频一起从头开始 */
  var toolbar = document.getElementById('toolbar');
  var btnReplay = document.getElementById('btnReplay');
  var btnPause = document.getElementById('btnPause');

  function getVideos() {
    return Array.prototype.slice.call(document.querySelectorAll('[data-slot] video'));
  }

  function syncFromStart() {
    var vs = getVideos();
    vs.forEach(function (v) { try { v.currentTime = 0; } catch (e) {} });
    vs.forEach(function (v) { v.play().catch(function () {}); });
    updatePauseBtn();
  }

  function togglePause() {
    var vs = getVideos();
    if (!vs.length) return;
    var playing = vs.some(function (v) { return !v.paused && !v.ended; });
    if (playing) {
      vs.forEach(function (v) { v.pause(); });
    } else if (vs.every(function (v) { return v.ended; })) {
      syncFromStart();
      return;
    } else {
      vs.forEach(function (v) { v.play().catch(function () {}); });
    }
    updatePauseBtn();
  }

  function updatePauseBtn() {
    var vs = getVideos();
    var playing = vs.some(function (v) { return !v.paused && !v.ended; });
    btnPause.classList.toggle('paused', !playing);
    btnPause.querySelector('span').textContent = playing ? '暂停' : '播放';
  }

  /* 控制条：有视频时才出现，鼠标静止 2.5s 自动隐藏 */
  var idleTimer = null;
  function pokeToolbar() {
    if (!getVideos().length) return;
    toolbar.classList.add('show');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { toolbar.classList.remove('show'); }, 2500);
  }
  document.addEventListener('mousemove', pokeToolbar);

  btnReplay.addEventListener('click', syncFromStart);
  btnPause.addEventListener('click', togglePause);

  document.addEventListener('keydown', function (e) {
    if (document.activeElement && document.activeElement.isContentEditable) return;
    if (e.key === 'r' || e.key === 'R') {
      syncFromStart();
      pokeToolbar();
    } else if (e.key === ' ') {
      e.preventDefault();
      togglePause();
      pokeToolbar();
    }
  });

  /* 素材上传：点击选择 / 拖拽。新视频导入后自动与已有视频对齐、一起从头播放 */
  var fileInput = document.getElementById('fileInput');
  var currentSlot = null;

  function setMedia(slot, file) {
    if (!file) return;
    var url = URL.createObjectURL(file);
    slot.querySelectorAll('video, img').forEach(function (el) {
      if (el.src) URL.revokeObjectURL(el.src);
      el.remove();
    });
    var el;
    if (file.type.indexOf('video') === 0) {
      el = document.createElement('video');
      el.src = url;
      el.muted = true;
      el.playsInline = true;
      el.preload = 'auto';
      el.addEventListener('loadedmetadata', syncFromStart);
      /* 不设 loop：等所有视频都播完再一起从头循环，时长不同也不会越播越乱 */
      el.addEventListener('ended', function () {
        var vs = getVideos();
        if (vs.length && vs.every(function (v) { return v.ended; })) syncFromStart();
        else updatePauseBtn();
      });
      el.addEventListener('play', updatePauseBtn);
      el.addEventListener('pause', updatePauseBtn);
    } else if (file.type.indexOf('image') === 0) {
      el = document.createElement('img');
      el.src = url;
      el.alt = '';
    } else {
      return;
    }
    slot.appendChild(el);
    slot.classList.add('has-media');
    updatePauseBtn();
    pokeToolbar();
  }

  document.querySelectorAll('[data-slot]').forEach(function (slot) {
    slot.addEventListener('click', function () {
      currentSlot = slot;
      fileInput.click();
    });
    slot.addEventListener('dragover', function (e) {
      e.preventDefault();
      slot.classList.add('dragover');
    });
    slot.addEventListener('dragleave', function () {
      slot.classList.remove('dragover');
    });
    slot.addEventListener('drop', function (e) {
      e.preventDefault();
      slot.classList.remove('dragover');
      var file = e.dataTransfer.files && e.dataTransfer.files[0];
      setMedia(slot, file);
    });
  });

  fileInput.addEventListener('change', function () {
    if (currentSlot) setMedia(currentSlot, fileInput.files[0]);
    fileInput.value = '';
  });
</script>
</body>
</html>
